services:
  ai-api:
    image: ai-api:20
    container_name: ai-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3346:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=postgresql://root:123456@postgres:5432/new-api
      - REDIS_CONN_STRING=redis://redis
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true

    depends_on:
      - redis
      - postgres
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  website:
    image: node:20-alpine
    container_name: website
    restart: always
    working_dir: /app
    command: node server.js
    ports:
      - "3347:3000"
    environment:
      - WEBSITE_API_BASE=http://ai-api:3000
      - NODE_ENV=production
      - TZ=Asia/Shanghai
    volumes:
      - ./website:/app
    depends_on:
      - ai-api

  redis:
    image: redis:latest
    container_name: redis
    restart: always

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: new-api
    volumes:
      - ./pg_data:/var/lib/postgresql/data

