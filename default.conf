server {
    listen 80;
    server_name www.broadscene.ai; # ⬅️ 更改为正式域名

    # 👇 这一行是关键：Certbot 会来这里证明这个域名真的属于你
    location ^~ /.well-known/acme-challenge/ {
        allow all;
        root /usr/share/nginx/html;
        default_type "text/plain";
    }

    # 其他所有 HTTP 请求都 301 永久重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

}

# HTTPS 服务
server {
    listen 443 ssl;
    server_name www.broadscene.ai;

    # 👇 指向正式域名的证书路径
    ssl_certificate /etc/letsencrypt/live/www.broadscene.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.broadscene.ai/privkey.pem;

    # 反向代理到你的 AI 项目
    location / {
        proxy_pass http://host.docker.internal:3346;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}