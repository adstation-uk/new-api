server {
    listen 80;
    server_name www.broadscene.ai;

    location ^~ /.well-known/acme-challenge/ {
        allow all;
        root /usr/share/nginx/html;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    server_name api.broadscene.ai;

    location ^~ /.well-known/acme-challenge/ {
        allow all;
        root /usr/share/nginx/html;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name www.broadscene.ai;

    ssl_certificate /etc/letsencrypt/live/www.broadscene.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.broadscene.ai/privkey.pem;

    # 当前保持不变：www -> ai-api
    location / {
        proxy_pass http://host.docker.internal:3346;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name api.broadscene.ai;

    # 测试阶段先复用 www 证书，避免 api 证书未签发时导致 Nginx 启动失败。
    # 签发 api 独立证书后，再改回 /etc/letsencrypt/live/api.broadscene.ai/...
    ssl_certificate /etc/letsencrypt/live/www.broadscene.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.broadscene.ai/privkey.pem;

    # 测试阶段：api -> website
    location / {
        proxy_pass http://host.docker.internal:3347;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}